name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Lint & compile (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lint tooling
        run: python -m pip install --upgrade pip ruff

      - name: Syntax check (compile all sources)
        run: python -m compileall -q dualled_pro.py

      - name: Lint with ruff
        # Non-blocking style report; fails only on real syntax/undefined-name errors.
        run: |
          ruff check --select=E9,F63,F7,F82 --output-format=full .
          ruff check --exit-zero --statistics .
